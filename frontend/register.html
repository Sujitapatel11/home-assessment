<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register</title>
  <style>
    body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f0f2f5; }
    .box { background: white; padding: 2rem; border-radius: 8px; width: 320px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    h2 { margin-top: 0; }
    input { width: 100%; padding: 0.5rem; margin: 0.4rem 0 1rem; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
    button { width: 100%; padding: 0.6rem; background: #4f46e5; color: white; border: none; border-radius: 4px; cursor: pointer; }
    button:hover { background: #4338ca; }
    .error { color: red; font-size: 0.85rem; margin-top: 0.5rem; }
    .success { color: green; font-size: 0.85rem; margin-top: 0.5rem; }
    .link { text-align: center; margin-top: 1rem; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="box">
    <h2>Create Account</h2>
    <label>Username</label>
    <input type="text" id="username" placeholder="Enter username">
    <label>Email</label>
    <input type="email" id="email" placeholder="Enter email">
    <label>Password</label>
    <input type="password" id="password" placeholder="Min 6 characters">
    <button onclick="register()">Register</button>
    <div class="error" id="error"></div>
    <div class="success" id="success"></div>
    <div class="link"><a href="/">Already have an account? Login</a></div>
  </div>

  <script>
    async function register() {
      const username = document.getElementById('username').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      const errorEl = document.getElementById('error');
      const successEl = document.getElementById('success');
      errorEl.textContent = '';
      successEl.textContent = '';

      const res = await fetch('https://home-assessment.onrender.com/api/accounts/register/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, email, password })
      });

      const data = await res.json();
      if (res.ok) {
        successEl.textContent = 'Account created! Redirecting to login...';
        setTimeout(() => window.location.href = '/', 1500);
      } else {
        const messages = Object.values(data).flat().join(' ');
        errorEl.textContent = messages || 'Registration failed.';
      }
    }
  </script>
</body>
</html>
